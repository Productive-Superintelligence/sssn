site_name: SSSN
site_description: Protocol and service layer for semantic channels.
site_url: https://sssn.one/
repo_name: Productive-Superintelligence/sssn
repo_url: https://github.com/Productive-Superintelligence/sssn
edit_uri: edit/main/docs/
copyright: '<a class="psi-footer-brand" href="https://sssn.one/"><span class="psi-footer-wordmark" aria-hidden="true"></span><span class="psi-footer-text">SSSN</span></a>'

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/logo.svg
  favicon: assets/logo.svg
  font:
    text: Newsreader
    code: Space Mono
  palette:
    - scheme: default
      primary: white
      accent: black
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.instant
    - navigation.top
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight

nav:
  - Overview:
      - Overview: index.md
      - Getting Started: getting-started.md
  - Channel:
      - Channel: protocol/index.md
      - Concepts:
          - Channels: concepts/channels.md
          - Events, Artifacts, Snapshots: concepts/events-artifacts-snapshots.md
          - Data Plane: concepts/data-plane.md
  - Backend:
      - Backend: backends/index.md
      - Store Backends:
          - Local Store: guides/local-store.md
      - Remote Access:
          - HTTP Client: guides/http-client.md
          - PsiHub Packages: guides/psihub-packages.md
  - Tutorials:
      - Channel Level:
          - First Channel: tutorials/first-channel.md
          - Event Envelope: tutorials/event-envelope.md
      - Backend:
          - Local Store: tutorials/local-store.md
          - HTTP Client: tutorials/http-client.md
      - Composition:
          - LLLM Tactic Processor: tutorials/lllm-tactic.md
  - Reference:
      - Python API: reference/python-api.md
      - HTTP API: reference/http-api.md
      - CLI: reference/cli.md

extra:
  generator: false
  homepage: https://sssn.one/
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Productive-Superintelligence/sssn

extra_css:
  - stylesheets/custom.20260629.css

extra_javascript:
  - javascripts/vendor/mermaid.min.js
  - javascripts/mermaid-init.20260629.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.tabbed:
      alternate_style: true
