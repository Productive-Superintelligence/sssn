site_name: SSSN
site_url: https://sssn.one
site_description: Simple System of Systems Network — a minimal two-abstraction framework for building composable, distributed AI agents.
site_author: Productive Superintelligence
repo_url: https://github.com/Productive-Superintelligence/sssn
repo_name: sssn
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo-white.svg
  favicon: assets/logo-white.svg
  # 1. Typography: Switching to modern fonts instantly elevates the look
  font:
    text: Inter 
    code: JetBrains Mono
  # 2. Modern UI Features
  features:
    # - navigation.tabs           # Moves top-level sections (Home, Core, etc.) to a modern top bar
    - navigation.tabs.sticky    # Keeps the top bar visible when scrolling down
    - navigation.sections
    - navigation.indexes
    - navigation.top            # Adds a smooth "Back to top" button
    - navigation.tracking       # Updates the URL hash as users scroll through headers
    - content.code.copy
    - search.suggest
    - search.highlight
  # 3. Refined Color Palettes
  palette:
    - scheme: default
      primary: white
      accent: black
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: white
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
extra_css:
  - stylesheets/custom.css


plugins:
  - search
  - autorefs

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Productive-Superintelligence/sssn

nav:
  - Home: index.md
  - Concepts:
    - concepts/index.md
    - Channel: concepts/channel.md
    - Channel Types: concepts/channel-types.md
    - System: concepts/system.md
    - Security: concepts/security.md
    - Transport & Client: concepts/transport.md
  - Tutorials:
    - tutorials/index.md
    - "1 · First Channel": tutorials/01-first-channel.md
    - "2 · Broadcast Bus": tutorials/02-broadcast.md
    - "3 · Work Queue": tutorials/03-work-queue.md
    - "4 · Multi-System": tutorials/04-multi-system.md
    - "5 · Securing Channels": tutorials/05-securing-channels.md
  - Examples:
    - examples/index.md
    - Data Pipeline: examples/data-pipeline.md
    - Request–Response: examples/request-response.md
    - Service Discovery: examples/discovery.md
